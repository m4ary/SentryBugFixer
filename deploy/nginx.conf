# Reverse proxy for SentryBugFixer.
# Terminates HTTPS and forwards to the container on 127.0.0.1:8000.
# The /ws/ block forwards the WebSocket upgrade so the live log popup works.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream sentrybugfixer {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name bugfixer.example.com;
    # Redirect everything to HTTPS (use certbot/Caddy/Traefik to manage certs).
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bugfixer.example.com;

    ssl_certificate     /etc/letsencrypt/live/bugfixer.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bugfixer.example.com/privkey.pem;

    # WebSocket endpoint (live fix logs) — must forward Upgrade/Connection headers.
    location /ws/ {
        proxy_pass http://sentrybugfixer;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # keep long-running fix streams alive
    }

    location / {
        proxy_pass http://sentrybugfixer;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
