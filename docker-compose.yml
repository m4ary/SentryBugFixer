services:
  sentrybugfixer:
    # Pull the published image (built by CI). Pin a version tag for prod, e.g. :1.0.0
    image: ghcr.io/m4ary/sentrybugfixer:latest
    # To build locally instead of pulling, uncomment and run `docker compose up --build`:
    # build: .
    container_name: sentrybugfixer
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8000:8000"
    env_file:
      - .env          # ANTHROPIC_API_KEY, SENTRY_AUTH_TOKEN, GITLAB_TOKEN, etc.
    environment:
      SBF_HOST: 0.0.0.0
      SBF_PORT: "8000"
      SBF_DATA_DIR: /data
    volumes:
      - sbf-data:/data   # persists the SQLite db, cloned repos and transcripts

volumes:
  sbf-data:
