<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="SentryBugFixer">
  <defs>
    <linearGradient id="sbf-body" x1="32" y1="16" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7d7d"/>
      <stop offset="1" stop-color="#ff5c5c"/>
    </linearGradient>
    <linearGradient id="sbf-ring" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#6a49f2"/>
    </linearGradient>
  </defs>

  <!-- soft violet glow -->
  <circle cx="32" cy="34" r="28" fill="url(#sbf-ring)" opacity="0.15"/>

  <!-- antennae -->
  <g stroke="#15171d" stroke-width="3" stroke-linecap="round">
    <path d="M27 9 C24 4 20 3 17 3"/>
    <path d="M37 9 C40 4 44 3 47 3"/>
  </g>
  <circle cx="16" cy="3" r="2.6" fill="#15171d"/>
  <circle cx="48" cy="3" r="2.6" fill="#15171d"/>

  <!-- body -->
  <ellipse cx="32" cy="37" rx="21" ry="19" fill="url(#sbf-body)"/>
  <line x1="32" y1="19" x2="32" y2="55" stroke="#15171d" stroke-width="2.4"/>

  <!-- head + eyes -->
  <circle cx="32" cy="19" r="9.5" fill="#15171d"/>
  <circle cx="28.4" cy="18" r="1.7" fill="#fff"/>
  <circle cx="35.6" cy="18" r="1.7" fill="#fff"/>

  <!-- spots -->
  <g fill="#15171d">
    <circle cx="23" cy="34" r="3"/>
    <circle cx="41" cy="34" r="3"/>
    <circle cx="25" cy="46" r="2.6"/>
    <circle cx="39" cy="46" r="2.6"/>
  </g>

  <!-- "fixed" check badge -->
  <circle cx="49" cy="49" r="10" fill="#0f1115"/>
  <circle cx="49" cy="49" r="8.2" fill="#2ecc71"/>
  <path d="M45 49.3 l2.8 2.8 l5.2 -5.6" stroke="#0f1115" stroke-width="2.6"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
